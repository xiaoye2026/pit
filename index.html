<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT: Journal of Professional Inutile Training</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-color: #1c1c1c; --bg-color: #f4f4f2; --accent-red: #b22222; }
        body { font-family: "Times New Roman", Times, SimSun, serif; background-color: var(--bg-color); color: var(--main-color); max-width: 1100px; margin: 0 auto; padding: 40px 20px; line-height: 1.7; }
        
        /* === 恢复特意设计的刊头 === */
        .header { text-align: center; border-bottom: 5px double var(--main-color); padding-bottom: 20px; margin-bottom: 40px; }
        .header h1 { font-size: 3rem; margin: 0; font-weight: bold; }
        .header p.subtitle { font-size: 1.3rem; font-weight: bold; margin: 5px 0; color: #000; }
        .header p.issn { font-size: 0.9rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }

        /* === 恢复导航栏设计 === */
        .nav { text-align: center; margin-bottom: 50px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #1c1c1c; padding-bottom: 10px; }
        .nav a { margin: 0 20px; text-decoration: none; color: var(--main-color); transition: 0.3s; border-bottom: 1px solid transparent; }
        .nav a:hover { background: #e3e3e0; border-bottom: 1px solid #000; }

        /* === 恢复布局结构 === */
        .layout { display: flex; flex-wrap: wrap; gap: 40px; }
        .main-col { flex: 2; min-width: 320px; }
        /* 侧边栏隔离线 */
        .side-col { flex: 1.2; min-width: 320px; border-left: 2px solid var(--main-color); padding-left: 30px; }

        /* === 恢复模块标题设计 === */
        .section-title { border-top: 2px solid var(--main-color); border-bottom: 2px solid var(--main-color); padding: 10px 0; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; background: #eee; padding: 5px 15px; }

        /* 文献卡片 */
        .paper-item { background: #fff; border: 1px solid #ddd; padding: 20px; margin-bottom: 30px; box-shadow: 5px 5px 0px #eee; transition: 0.3s; }
        .paper-item:hover { box-shadow: 8px 8px 0px #ddd; }
        .paper-title { font-size: 1.3rem; font-weight: bold; cursor: pointer; color: #000; display: block; margin-bottom: 10px; text-decoration: none; }
        .paper-title:hover { text-decoration: underline; color: #555; }
        .paper-author { font-style: italic; color: #555; font-size: 0.9rem; margin-bottom: 10px; }
        .abstract-box { background: #f9f9f7; border-left: 4px solid var(--main-color); padding: 10px; margin: 15px 0; font-size: 0.95rem; line-height: 1.6; color: #444; }
        
        /* 翻页组件 */
        .pagination { display: flex; justify-content: center; gap: 10px; align-items: center; margin-top: 20px; }

        /* 天坑论坛模块 */
        .forum-module { border: 2px solid var(--main-color); background: #ebebe8; padding: 15px; margin-bottom: 20px; cursor: pointer; transition: 0.2s; }
        .forum-module:hover { background-color: #e3e3e0; }
        .progress-container { width: 100%; height: 18px; border: 2px solid var(--main-color); background: #fff; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--main-color); width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .comment-section { display: none; margin-top: 15px; border-top: 1px dashed #1c1c1c; padding-top: 15px; cursor: default; }
        .hot-comment { font-size: 0.9rem; background: #fff; padding: 10px; border: 1px solid #ccc; font-style: normal; margin-bottom: 10px; color: #333; }

        /* 按钮与输入 */
        button { padding: 8px 16px; background: var(--main-color); color: #f4f4f2; border: 1px solid var(--main-color); font-weight: bold; cursor: pointer; font-family: inherit; text-transform: uppercase; font-size: 0.85rem; }
        button:hover { background: #f4f4f2; color: var(--main-color); box-shadow: 2px 2px 0px #1c1c1c; }
        button:disabled { background: #ccc; border-color: #ccc; color: #666; cursor: not-allowed; box-shadow: none; }
        
        .like-btn { padding: 4px 10px; font-size: 0.8rem; background: transparent; color: var(--main-color); border: 1px solid var(--main-color); }
        .like-btn:hover { background: var(--main-color); color: #fff; box-shadow: none; }

        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--main-color); margin-bottom: 12px; box-sizing: border-box; font-family: inherit; }

        /* 弹窗 */
        dialog { border: 5px solid var(--main-color); background: var(--bg-color); width: 90%; max-width: 650px; padding: 30px; box-shadow: 15px 15px 0px rgba(0,0,0,0.2); }
        dialog::backdrop { background: rgba(0,0,0,0.7); }
    </style>
</head>

        <p class="issn">ISSN 0000-0250 | Est. 2026 | 全球学术牛马实时互助平台</p>
    </div>

    <div class="nav">
        <a href="#papers">Literature / 最新文献</a>
        <a href="#forum">Pit Index / 天坑论坛</a>
        <a href="#ai">AI Generator / 生成器</a>
    </div>

                <button onclick="document.getElementById('submitModal').showModal()">投稿直发 / Submit</button>
            </div>
            <div id="papers-container">📡 正在检索学术废料...</div>
            <div id="pagination-controls" class="pagination"></div>

            <div id="forum-container">📡 同步怨种数据...</div>
